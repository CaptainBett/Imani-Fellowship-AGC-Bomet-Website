{% extends "base.html" %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<section class="section-padding" style="min-height: 60vh; display: flex; align-items: center;">
    <div class="container text-center">
        <h1 class="display-1 fw-bold text-primary mb-3">403</h1>
        <h2 class="fw-bold mb-3">Access Denied</h2>
        <p class="text-muted mb-4" style="max-width: 500px; margin: 0 auto;">
            You don't have permission to access this page.
            If you believe this is an error, please contact the church office.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('main.home') }}" class="btn btn-primary btn-lg">
                <i class="bi bi-house"></i> Go Home
            </a>
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-primary btn-lg">
                <i class="bi bi-box-arrow-in-right"></i> Log In
            </a>
        </div>
    </div>
</section>
{% endblock %}
