{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<section class="section-padding" style="min-height: 60vh; display: flex; align-items: center;">
    <div class="container text-center">
        <h1 class="display-1 fw-bold text-primary mb-3">404</h1>
        <h2 class="fw-bold mb-3">Page Not Found</h2>
        <p class="text-muted mb-4" style="max-width: 500px; margin: 0 auto;">
            Sorry, the page you are looking for doesn't exist or has been moved.
            Let's get you back on track.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('main.home') }}" class="btn btn-primary btn-lg">
                <i class="bi bi-house"></i> Go Home
            </a>
            <a href="{{ url_for('connect.newcomers') }}" class="btn btn-outline-primary btn-lg">
                <i class="bi bi-person-plus"></i> I'm New Here
            </a>
        </div>
    </div>
</section>
{% endblock %}
