services:
  - type: web
    name: imani-fellowship
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn \"app:create_app('production')\" --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: imani-fellowship-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Set these manually in Render Dashboard > Environment:
      # MPESA_CONSUMER_KEY, MPESA_CONSUMER_SECRET, MPESA_SHORTCODE,
      # MPESA_PASSKEY, MPESA_ENV, TINYMCE_API_KEY

databases:
  - name: imani-fellowship-db
    plan: free
